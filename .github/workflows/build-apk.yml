name: Build Release APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build APK inside Docker
        run: |
          docker build -t shop-agent:ci .
          CID=$(docker create --name extract shop-agent:ci)
          docker cp "$CID:/workspace/app/build/outputs/apk/release/app-release.apk" ./app-release.apk
          docker rm -f "$CID"
          ls -la app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-agent-release-apk
          path: app-release.apk
          if-no-files-found: error
